# ... (Keep your existing name, on, permissions, and concurrency blocks identical)

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 1. Setup Node.js instead of Jekyll
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 2. Install your React/Vite dependencies
      - name: Install dependencies
        run: npm ci

      # 3. Compile the Vite project
      - name: Build project
        run: npm run build

      # 4. Upload Vite's output folder (dist) instead of Jekyll's (_site)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # Deployment job (Keep this exactly the same as your current file)
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
